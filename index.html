<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandelbrot & Julia</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      background:#000;
      overflow:hidden;
    }
    video {
      width:100vw;
      height:100vh;
      object-fit: contain;   /* cambia a 'cover' si prefieres que llene todo recortando bordes */
      display:block;
    }
  </style>
</head>
<body>
  <video autoplay loop muted playsinline>
    <source src="julia_mandelbrot.mp4" type="video/mp4">
  </video>

  <script>
    // Pantalla completa real con un clic en cualquier parte (obligatorio por navegadores)
    document.addEventListener('click', function() {
      const v = document.querySelector('video');
      if (v.requestFullscreen) v.requestFullscreen();
      else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
      else if (v.msRequestFullscreen) v.msRequestFullscreen();
    });
  </script>
</body>
</html>
